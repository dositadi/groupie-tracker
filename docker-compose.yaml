services:
  app:
    build: .
    environment:
      - POSTGRES_DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
    ports:
      - 8080:8080
    volumes:
      - .:/groupie-tracker
      - /groupie-tracker/tmp
    depends_on:
      db:
        condition: 'service_healthy'
  
  db:
    image: postgres:17-alpine3.22
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - groupie_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      #start_period: 30s

volumes:
  groupie_data:
    