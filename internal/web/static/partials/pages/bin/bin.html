{{define "others-for-future-use"}}
<!-- ── CARD 2 — FAVOURITED ── -->
<article class="artist-card visible card-d2 group relative flex flex-col">

<div class="relative overflow-hidden" style="border-radius: 16px 16px 0 0;">
    <img
    src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&q=80"
    alt="Marcus Veil"
    class="artist-card-img"
    />
    <!-- Favourite button (FILLED — favourited) -->
    <button
    class="fav-btn absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-rose-500 border border-rose-400 text-white hover:bg-rose-600 transition-all duration-200"
    aria-label="Remove from favourites"
    >
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    </button>
    <!-- Trending badge -->
    <div class="absolute bottom-3 left-3">
    <span class="inline-flex items-center gap-1 bg-brand/80 backdrop-blur-sm border border-indigo-300/30 text-white text-[10px] font-medium px-2 py-1 rounded-full">
        <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Trending
    </span>
    </div>
</div>

<div class="flex flex-col flex-1 p-3.5">
    <span class="genre-badge mb-2 self-start">Hip-Hop</span>
    <h3 class="font-semibold text-ink text-sm leading-snug mb-1">Marcus Veil</h3>
    <p class="text-ink-muted text-xs flex items-center gap-1 mb-3">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
    </svg>
    Atlanta, USA
    </p>
    <div class="flex items-center gap-3 mb-3.5">
    <div class="stat-pill">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        8.1M
    </div>
    <div class="stat-pill">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        312 tracks
    </div>
    </div>
    <a href="#" class="mt-auto flex items-center justify-center gap-1.5 w-full bg-brand-light text-brand border border-indigo-100 hover:bg-brand hover:text-white hover:border-brand text-xs font-medium py-2 rounded-lg transition-all duration-200">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
    </svg>
    View Profile

</div>
</article>
